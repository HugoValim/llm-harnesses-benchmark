# Conda environment for the python-benchmark harness.
#
#   conda env create -f environment.yaml
#   conda activate python-benchmark
#
# Python deps: harness scripts + pytest only.
#
# PYTHONNOUSERSITE keeps ~/.local packages out of pip's resolver so installs
# here do not warn about unrelated user-site deps (anthropic, pip-audit, etc.).
#
# Node supports scripts/browser_probe.mjs (headless Chromium via CDP).
#
# Not installable here (must be on PATH / host separately):
#   chromium — browser probe spawns the `chromium` binary (e.g. apt install chromium)
#   opencode, codex, claude, cursor agent, ollama — benchmark agent CLIs
#   Docker Engine + Compose plugin — runtime verification docker steps
#   Provider API keys / subscriptions — cloud model runs

name: python-benchmark
channels:
  - conda-forge
dependencies:
  - python>=3.10,<3.13
  - pip
  - nodejs>=20
  - git
  - curl
  - pip:
      # scripts/tests (AGENTS.md: pytest scripts/tests)
      - pytest>=8,<10
variables:
  PYTHONNOUSERSITE: "1"
