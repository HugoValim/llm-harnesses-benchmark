{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <link rel="stylesheet" href="{% static 'css/tailwind.css' %}">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-ws@2.0.4/ws.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex flex-col">
    <header class="border-b border-gray-700 p-4">
        <h1 class="text-xl font-semibold">Ollama Chat</h1>
    </header>

    <main id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4" hx-ext="ws" ws-connect="/ws/chat/">
        {% include "chat/message_list.html" %}
    </main>

    <footer class="border-t border-gray-700 p-4">
        <form id="chat-form" ws-send class="flex gap-2">
            <input
                type="text"
                name="content"
                id="message-input"
                placeholder="Type a message..."
                class="flex-1 rounded-lg bg-gray-800 border border-gray-600 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                autocomplete="off"
            >
            <button type="submit" class="rounded-lg bg-blue-600 px-4 py-2 font-medium hover:bg-blue-500">
                Send
            </button>
        </form>
    </footer>

    <script src="{% static 'js/chat.js' %}"></script>
</body>
</html>
