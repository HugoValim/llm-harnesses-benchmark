{% extends "chat/base.html" %}

{% block content %}
<div hx-ext="ws" ws-connect="/ws/chat/" class="bg-white rounded-lg shadow-md w-full p-6">
    <div id="chat-messages" ws-receive="#messages swap:beforeend" class="space-y-4 h-96 overflow-y-auto mb-4">
        <!-- Messages will be appended here -->
    </div>
    <form>
        <input type="text" name="message" id="message-input" class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Type a message..." required ws-send="value">
        <button type="submit" class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500">Send</button>
    </form>
</div>

<script>
    // Focus the input on load
    document.getElementById('message-input').focus();
</script>
{% endblock %}
