<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Check</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="bg-white border border-gray-200 rounded-lg px-8 py-6 shadow-sm">
        <h1 class="text-2xl font-semibold text-gray-800 mb-4">Ollama Health Check</h1>
        <div id="health-status" class="text-gray-600">Checking...</div>
    </div>
    
    <script>
        async function checkHealth() {
            const statusEl = document.getElementById('health-status');
            try {
                const response = await fetch('/api/health/', {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                });
                const data = await response.json();
                
                if (data.ollama_reachable) {
                    statusEl.innerHTML = '<span class="text-green-600 font-medium">Ollama is reachable</span>';
                    statusEl.innerHTML += '<p class="mt-2 text-sm">Model: ' + (data.model || 'unknown') + '</p>';
                } else {
                    statusEl.innerHTML = '<span class="text-red-600 font-medium">Ollama is not reachable</span>';
                    statusEl.innerHTML += '<p class="mt-2 text-sm">' + (data.error || 'Connection failed') + '</p>';
                }
            } catch (e) {
                statusEl.innerHTML = '<span class="text-red-600 font-medium">Health check failed</span>';
                statusEl.innerHTML += '<p class="mt-2 text-sm">' + e.message + '</p>';
            }
        }
        
        checkHealth();
    </script>
</body>
</html>
