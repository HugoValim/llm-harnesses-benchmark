{% extends "chat/base.html" %}
{% block content %}
<div class="flex-1 flex flex-col max-w-3xl mx-auto w-full p-4">
    <div id="messages" class="flex-1 overflow-y-auto space-y-4 mb-4">
    </div>
    <form
        id="chat-form"
        hx-ext="ws"
        ws-connect="/ws/chat/"
        ws-send=""
        class="flex gap-2"
    >
        <input
            type="text"
            name="message"
            id="msg-input"
            placeholder="Type a message..."
            autocomplete="off"
            required
            class="flex-1 border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
        <button
            type="submit"
            class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700"
        >
            Send
        </button>
    </form>
    <div id="typing" class="hidden text-sm text-gray-500">Thinking...</div>
</div>
<script>
    document.body.addEventListener('htmx:wsBeforeMessage', function(evt) {
        const data = JSON.parse(evt.detail.message);
        const box = document.getElementById('messages');
        const typing = document.getElementById('typing');
        const input = document.getElementById('msg-input');
        if (data.type === 'user_message') {
            const div = document.createElement('div');
            div.className = 'bg-blue-100 self-end rounded-lg p-3';
            div.textContent = data.content;
            box.appendChild(div);
            typing.classList.remove('hidden');
            input.value = '';
        } else if (data.type === 'bot_start') {
            const div = document.createElement('div');
            div.id = 'bot-msg';
            div.className = 'bg-gray-200 self-start rounded-lg p-3';
            div.textContent = '';
            box.appendChild(div);
            typing.classList.add('hidden');
        } else if (data.type === 'bot_token') {
            const div = document.getElementById('bot-msg');
            if (div) div.textContent += data.content;
        } else if (data.type === 'bot_error') {
            const div = document.getElementById('bot-msg');
            if (div) div.classList.add('text-red-600');
            if (div) div.textContent += data.content;
        } else if (data.type === 'bot_end') {
            const div = document.getElementById('bot-msg');
            if (div) div.removeAttribute('id');
        }
        box.scrollTop = box.scrollHeight;
    });
</script>
{% endblock %}
