{% extends "base.html" %}
{% block title %}Chat{% endblock %}

{% block content %}
<div class="flex flex-col h-full max-w-3xl mx-auto">

    <!-- Header -->
    <header class="flex items-center justify-between px-4 py-3 border-b border-gray-800">
        <h1 class="text-lg font-semibold">Chat</h1>
        <span id="model-badge" class="text-xs text-gray-500">{{ ollama_model|default:"" }}</span>
    </header>

    <!-- Messages container — HTMX ws-connect attaches here -->
    <main
        id="chat-messages"
        class="flex-1 overflow-y-auto px-4 py-4 space-y-3"
        hx-ext="ws"
        ws-connect="/ws/chat/"
    >
        <div id="ws-connect-target" class="hidden"></div>

        <!-- Empty state -->
        <div id="empty-state" class="flex items-center justify-center h-full text-gray-600">
            <p>Send a message to start.</p>
        </div>
    </main>

    <!-- Input bar -->
    <footer class="border-t border-gray-800 px-4 py-3">
        <form
            id="chat-form"
            class="flex gap-2"
            ws-send
            hx-trigger="submit"
        >
            {% csrf_token %}
            <input
                id="chat-input"
                name="message"
                type="text"
                placeholder="Type your message…"
                autocomplete="off"
                autofocus
                class="flex-1 bg-gray-800 border border-gray-700 rounded-lg px-4 py-2
                       text-gray-100 placeholder-gray-500 focus:outline-none focus:ring-2
                       focus:ring-blue-500 focus:border-transparent"
            >
            <button
                type="submit"
                class="bg-blue-600 hover:bg-blue-700 text-white font-medium
                       px-5 py-2 rounded-lg transition-colors"
            >
                Send
            </button>
        </form>
    </footer>
</div>

<script>
    // Trim empty state when messages arrive
    document.body.addEventListener("htmx:wsAfterMessage", () => {
        const empty = document.getElementById("empty-state");
        if (empty) empty.remove();
    });

    // Clear input and disable during streaming, re-enable after
    document.body.addEventListener("htmx:wsBeforeSend", () => {
        const input = document.getElementById("chat-input");
        input.setAttribute("disabled", "true");
        input.value = "";
    });
    document.body.addEventListener("htmx:wsAfterMessage", () => {
        const input = document.getElementById("chat-input");
        input.removeAttribute("disabled");
        input.focus();
    });
</script>
{% endblock %}
