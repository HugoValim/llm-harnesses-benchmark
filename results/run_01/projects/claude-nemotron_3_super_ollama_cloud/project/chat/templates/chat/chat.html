<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>
    {% load static %}
    <link href="{% static 'css/styles.css' %}" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/htmx.org/dist/ext/ws.js"></script>
</head>
<body>
    <div class="container mx-auto p-4">
        <h1 class="text-2xl font-bold mb-4">AI Chat</h1>
        <div id="chat-messages" class="h-96 overflow-y-auto border p-4 mb-4 bg-gray-50">
            <!-- Messages will be loaded here -->
        </div>
        <form id="chat-form" hx-post="/chat/" hx-trigger="submit" hx-target="#chat-messages" hx-swap="beforeend">
            <div class="flex">
                <input type="text" name="message" id="message-input" class="flex-1 p-2 border rounded-l" placeholder="Type your message..." required>
                <button type="submit" class="px-4 py-2 bg-blue-500 text-white rounded-r">Send</button>
            </div>
        </form>
    </div>

    <script>
        // Initialize WebSocket connection
        const ws = new WebSocket("ws://" + window.location.host + "/ws/chat/");
        
        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);
            const chatMessages = document.getElementById('chat-messages');
            
            if (data.type === 'system') {
                const messageDiv = document.createElement('div');
                messageDiv.className = 'mb-2 italic text-sm text-gray-500';
                messageDiv.textContent = data.message;
                chatMessages.appendChild(messageDiv);
            } else if (data.type === 'content') {
                const messageDiv = document.createElement('div');
                messageDiv.className = 'mb-2';
                messageDiv.textContent = data.message;
                chatMessages.appendChild(messageDiv);
            } else if (data.type === 'end') {
                // Optionally handle end of stream
            }
            
            // Scroll to bottom
            chatMessages.scrollTop = chatMessages.scrollHeight;
        };
        
        ws.onopen = function() {
            console.log('WebSocket connection established');
        };
        
        ws.onclose = function() {
            console.log('WebSocket connection closed');
        };
        
        ws.onerror = function(error) {
            console.error('WebSocket error:', error);
        };
    </script>
</body>
</html>
