[mypy]
python_version = 3.13
show_error_codes = true
strict = true
warn_unreachable = true
ignore_missing_imports = true

[mypy-chat_app.tests.*]
ignore_errors = True

[mypy-chat_app.migrations.*]
ignore_errors = True

[mypy-*.migrations.*]
ignore_errors = True

[mypy-chat_project.*]
ignore_errors = True

[mypy-*.*.models]
ignore_errors = True

[mypy-chat_app.apps]
ignore_errors = True
