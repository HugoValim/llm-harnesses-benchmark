{% extends "chat/base.html" %}

{% block body %}
<div
  class="grid h-dvh grid-cols-1 bg-neutral-950 md:grid-cols-[17rem_minmax(0,1fr)]"
  hx-ext="ws"
  ws-connect="{{ websocket_path }}"
>
  <aside class="hidden border-r border-neutral-800 bg-neutral-900/80 px-4 py-5 md:block">
    <h1 class="text-base font-semibold tracking-normal text-neutral-50">Ollama Chat</h1>
    <div class="mt-5 rounded border border-neutral-800 bg-neutral-950/70 p-3 text-sm text-neutral-400">
      <div class="font-medium text-neutral-200">qwen2.5:7b</div>
      <a class="mt-2 inline-block text-cyan-300 hover:text-cyan-200" href="{% url 'ollama-health' %}">Health</a>
    </div>
  </aside>

  <main class="flex min-h-0 flex-col">
    <header class="border-b border-neutral-800 bg-neutral-950/95 px-4 py-3 md:hidden">
      <h1 class="text-base font-semibold text-neutral-50">Ollama Chat</h1>
    </header>

    <section id="messages" class="flex-1 space-y-5 overflow-y-auto px-4 py-6 md:px-8"></section>

    <footer class="border-t border-neutral-800 bg-neutral-950 px-4 py-4 md:px-8">
      <form class="mx-auto flex max-w-4xl items-end gap-3" ws-send>
        {% csrf_token %}
        <label class="sr-only" for="message">Message</label>
        <textarea
          id="message"
          name="message"
          required
          rows="2"
          class="max-h-44 min-h-14 flex-1 resize-y rounded border border-neutral-700 bg-neutral-900 px-4 py-3 text-sm leading-6 text-neutral-100 outline-none ring-0 placeholder:text-neutral-500 focus:border-cyan-400"
          placeholder="Message"
        ></textarea>
        <button
          type="submit"
          class="h-11 rounded bg-cyan-400 px-5 text-sm font-semibold text-neutral-950 hover:bg-cyan-300 focus:outline-none focus:ring-2 focus:ring-cyan-200"
        >
          Send
        </button>
      </form>
    </footer>
  </main>
</div>
{% endblock %}
