[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "B", "S", "I"]
ignore = []

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101", "S105"]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.mypy]
python_version = "3.13"
strict = true
ignore_missing_imports = true
exclude = ["migrations"]

[tool.coverage.run]
source = ["chat"]
omit = ["tests/*"]

[tool.coverage.report]
show_missing = true
