<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>
    <link rel="stylesheet" href="/static/dist/output.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/htmx-ext-ws@1.0.0/dist/ext-ws.js"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col" hx-ext="ws connect:/ws/chat/">
    <header class="bg-white shadow p-4 flex justify-between items-center">
        <h1 class="text-xl font-bold">Ollama Chat</h1>
        <a href="/health/" class="text-sm text-gray-500 hover:underline">Health Check</a>
    </header>

    <main id="chat-window" class="flex-1 overflow-y-auto p-4 space-y-4">
        <!-- Messages will be appended here -->
    </main>

    <footer class="p-4 bg-white border-t">
        <form ws-send class="flex gap-2">
            <input type="text" name="prompt" 
                   class="flex-1 p-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" 
                   placeholder="Type your message..."
                   autocomplete="off">
            <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Send</button>
        </form>
    </footer>

    <script>
        document.body.addEventListener('htmx:wsMessage', function(evt) {
            const data = JSON.parse(evt.detail.message);
            const window = document.getElementById('chat-window');
            
            if (data.type === 'message') {
                const div = document.createElement('div');
                div.id = 'ai-loading';
                div.innerHTML = data.content;
                div.className = 'flex justify-start';
                window.appendChild(div);
            } else if (data.type === 'token') {
                let aiDiv = document.getElementById('current-ai-msg');
                if (!aiDiv) {
                    aiDiv = document.createElement('div');
                    aiDiv.id = 'current-ai-msg';
                    aiDiv.className = 'flex justify-start';
                    aiDiv.innerHTML = '<div class="bg-white p-3 rounded-lg shadow-sm max-w-3xl text-gray-800"><span class="ai-text"></span></div>';
                    window.appendChild(aiDiv);
                    
                    const loading = document.getElementById('chat-loading');
                    if (loading) loading.remove();
                }
                aiDiv.querySelector('.ai-text').innerText += data.content;
            } else if (data.type === 'done') {
                const aiDiv = document.getElementById('current-ai-msg');
                if (aiDiv) aiDiv.id = ''; 
            } else if (data.type === 'error') {
                const div = document.createElement('div');
                div.className = 'flex justify-start';
                div.innerHTML = '<div class="bg-red-100 text-red-700 p-3 rounded-lg shadow-sm max-w-3xl">' + data.content + '</div>';
                window.appendChild(div);
            }
            window.scrollTo(0, window.scrollHeight);
        });

        document.querySelector('form').addEventListener('submit', function(e) {
            const input = this.querySelector('input');
            const prompt = input.value;
            if (!prompt) return;
            
            const window = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = 'flex justify-end';
            div.innerHTML = '<div class="bg-blue-600 text-white p-3 rounded-lg shadow-sm max-w-3xl">' + prompt + '</div>';
            window.appendChild(div);
            
            input.value = '';
            window.scrollTo(0, window.scrollHeight);
        });
    </script>
</body>
</html>
