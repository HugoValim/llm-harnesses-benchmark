services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SECRET_KEY
      - OLLAMA_HOST=${OLLAMA_HOST:-http://localhost:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:7b}
      - DEBUG
      - ALLOWED_HOSTS
    env_file:
      - path: .env
        required: false
    volumes:
      - ./db.sqlite3:/app/db.sqlite3
