services:
  web:
    build: .
    # daphne (ASGI) is the image's CMD; Channels needs ASGI, not WSGI.
    ports:
      - "8000:8000"
    environment:
      # Required. Compose fails fast if it is not exported (or set in a .env
      # file). No literal fallback is provided, so no secret lives in source.
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY must be set, e.g. export DJANGO_SECRET_KEY=$(python -c 'import secrets; print(secrets.token_urlsafe(64))')}"
      # Production-safe, overridable, non-secret config.
      DJANGO_DEBUG: "${DJANGO_DEBUG:-false}"
      DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}"
      DJANGO_CSRF_TRUSTED_ORIGINS: "${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}"
      # Ollama is reached on the host by default; override for a remote server.
      OLLAMA_HOST: "${OLLAMA_HOST:-http://host.docker.internal:11434}"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-qwen2.5:7b}"
    # Lets the container reach an Ollama server running on the Docker host
    # (works on Docker Desktop and modern Linux with host-gateway support).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
