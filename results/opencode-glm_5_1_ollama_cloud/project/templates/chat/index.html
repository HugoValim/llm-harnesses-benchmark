{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chat</title>
    <link rel="stylesheet" href="{% static 'css/app.css' %}">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4/dist/ext/ws.js"></script>
</head>
<body class="bg-gray-950 text-gray-100 h-full flex flex-col">
    <header class="border-b border-gray-800 px-4 py-3">
        <h1 class="text-lg font-semibold">Chat</h1>
    </header>
    <main class="flex-1 overflow-y-auto px-4 py-6 space-y-4" id="chat-messages">
        <div class="text-gray-500 text-center" id="empty-state">Send a message to start chatting</div>
    </main>
    {% include "chat/_input.html" %}
    <script src="{% static 'src/chat.js' %}" defer></script>
</body>
</html>
