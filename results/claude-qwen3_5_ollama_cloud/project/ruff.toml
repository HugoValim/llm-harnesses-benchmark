# Ruff configuration
# See: https://docs.astral.sh/ruff/configuration/

target-version = "py312"
line-length = 100

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "ARG", # flake8-unused-arguments
    "SIM", # flake8-simplify
]
ignore = [
    "E501",  # line too long (handled by formatter)
    "B008",  # do not perform function calls in argument defaults (Django uses this)
    "B904",  # raise without from inside except (acceptable in some cases)
]

[lint.per-file-ignores]
"__init__.py" = ["F401"]  # unused imports in __init__ files
"conftest.py" = ["F401"]  # fixtures may appear unused
"test_*.py" = ["ARG", "SIM"]  # relax rules for tests
"chat/views.py" = ["ARG001"]  # Django view functions receive request by convention

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
