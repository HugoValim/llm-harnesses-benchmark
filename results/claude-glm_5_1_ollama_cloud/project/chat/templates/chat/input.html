<form id="chat-form" ws-send class="flex gap-2">
  {% csrf_token %}
  <input
    id="chat-input"
    type="text"
    name="message"
    placeholder="Type a message..."
    autocomplete="off"
    class="flex-1 rounded-lg bg-gray-800 border border-gray-700 px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
  >
  <button
    type="submit"
    class="rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium hover:bg-blue-700 transition-colors"
  >
    Send
  </button>
</form>
