<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ollama Chat</title>
    <link rel="stylesheet" href="/static/css/output.css">
    <script src="https://unpkg.com/htmx.org@2.0.0"></script>
    <script src="https://unpkg.com/htmx.org/dist/ext/ws.js"></script>
</head>
<body class="bg-gray-200 h-screen flex flex-col">
    <div class="flex-grow overflow-y-auto p-4" 
         hx-ext="ws" 
         ws-connect="/ws/chat/">
        <div id="chat-window" class="flex flex-col space-y-2">
            <!-- Messages appear here -->
        </div>
    </div>
    
    <div class="p-4 bg-white border-t flex gap-2">
        <input type="text" 
               name="message" 
               id="chat-input"
               class="flex-grow p-2 border rounded-lg" 
               placeholder="Ask me anything..."
               ws-send>
        <button class="bg-blue-500 text-white px-4 py-2 rounded-lg"
                onclick="document.getElementById('chat-input').dispatchEvent(new Event('submit'))">
            Send
        </button>
    </div>

    <script>
        // Basic UI polish: send on Enter
        document.getElementById('chat-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                this.dispatchEvent(new Event('submit'));
                this.value = '';
            }
        });
    </script>
</body>
</html>
