{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chat</title>
  <link rel="stylesheet" href="{% static 'dist/styles.css' %}">
  <script src="{% static 'vendor/htmx.min.js' %}" defer></script>
  <script src="{% static 'vendor/htmx-ws.js' %}" defer></script>
</head>
<body class="h-full bg-gray-900 text-gray-100 flex flex-col">
  <header class="border-b border-gray-700 px-4 py-3 flex items-center gap-2">
    <h1 class="text-lg font-semibold">Chat</h1>
  </header>

  <main id="chat-area" class="flex-1 overflow-y-auto px-4 py-4 space-y-4">
    <div id="messages" class="space-y-4"></div>
  </main>

  <form id="chat-form"
        class="border-t border-gray-700 px-4 py-3 flex gap-2"
        hx-ext="ws"
        ws-connect="/ws/chat/"
        ws-send>
    <input type="text"
           name="message"
           id="msg-input"
           autocomplete="off"
           placeholder="Type a message…"
           class="flex-1 rounded-md bg-gray-800 border border-gray-600 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
           required>
    <button type="submit"
            class="rounded-md bg-blue-600 px-4 py-2 font-medium hover:bg-blue-500 transition-colors">
      Send
    </button>
  </form>

  <div id="error-banner"
       class="hidden fixed top-4 left-1/2 -translate-x-1/2 bg-red-600 text-white px-4 py-2 rounded shadow-lg text-sm">
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var messagesEl = document.getElementById('messages');
      var errorBanner = document.getElementById('error-banner');
      var currentAiEl = null;

      function showError(msg) {
        errorBanner.textContent = msg;
        errorBanner.classList.remove('hidden');
        setTimeout(function () { errorBanner.classList.add('hidden'); }, 5000);
      }

      function createHumanBubble(text) {
        var div = document.createElement('div');
        div.className = 'flex justify-end';
        var bubble = document.createElement('div');
        bubble.className = 'rounded-2xl bg-blue-600 px-4 py-2 max-w-[70%] whitespace-pre-wrap';
        bubble.textContent = text;
        div.appendChild(bubble);
        return div;
      }

      function createAiBubble() {
        var div = document.createElement('div');
        div.className = 'flex justify-start';
        var bubble = document.createElement('div');
        bubble.className = 'rounded-2xl bg-gray-700 px-4 py-2 max-w-[70%] whitespace-pre-wrap';
        div.appendChild(bubble);
        return div;
      }

      document.body.addEventListener('htmx:wsBeforeSend', function (evt) {
        var input = document.getElementById('msg-input');
        var text = input.value.trim();
        if (!text) { evt.preventDefault(); return; }
        messagesEl.appendChild(createHumanBubble(text));
        currentAiEl = createAiBubble();
        messagesEl.appendChild(currentAiEl);
        input.value = '';
      });

      document.body.addEventListener('htmx:wsMessage', function (e) {
        var data;
        try { data = JSON.parse(e.detail.message); } catch (_) { return; }

        if (data.type === 'start') {
          currentAiEl = createAiBubble();
          messagesEl.appendChild(currentAiEl);
        } else if (data.type === 'token' && currentAiEl) {
          var bubble = currentAiEl.querySelector('div');
          bubble.textContent += data.content;
          messagesEl.scrollTop = messagesEl.scrollHeight;
        } else if (data.type === 'end') {
          currentAiEl = null;
        } else if (data.type === 'error') {
          showError(data.content);
          currentAiEl = null;
        }
      });
    });
  </script>
</body>
</html>
