# Probe-owned mypy config. Every target is graded against the same baseline
# so cross-target D10 scores compare apples-to-apples.
#
# Plugins from the target project (e.g. mypy_django_plugin) are NOT loaded
# because the probe venv only has the tools in _quality_probe/requirements.txt.
# This costs Django-aware type inference but keeps the bar uniform.

[mypy]
ignore_missing_imports = True
follow_imports = silent
show_error_codes = True
warn_unused_ignores = False
warn_redundant_casts = False
no_implicit_optional = True
strict_optional = True
disable_error_code = import-untyped, import-not-found
